name: Deploy Weather App

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v3
          
        - name: Docker Login
          uses: docker/login-action@v2
          with:
            username : ${{ secrets.DOCKER_USERNAME }}
            password : ${{ secrets.DOCKER_PASSWORD }}

        - name: Build Docker Image
          run: |
            docker build -t jagtapritesh16/weather-app ./weather-app

        - name: Push Docker Image
          run: |
            docker push jagtapritesh16/weather-app
        
        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            hosts: ${{ secrets.EC2_HOST }}
            username: ec2-user
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull jagtapritesh16/weather-app
              docker stop weather || true
              docker rm weather || true
              docker run -d -p 8-:3000 --name weather jagtapritesh16/weather-app