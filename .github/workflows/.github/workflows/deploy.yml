name: Build & Deploy Weather App

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            #1. Checkout your repo
            - name: checkout code
              uses: actions/checkout@v3
          
            # 2. Login in to docker hub  
            - name: Docker Login
              uses: docker/login-action@v2
              with:
                username : ${{ secrets.DOCKER_USERNAME }}
                password : ${{ secrets.DOCKER_PASSWORD }}
              
            # 3. Build Docker Image   
            - name: Build Docker Image
              run: |
                docker build -t jagtapritesh16/weather-app ./weather-app

            # 4. Push Docker Image    
            - name: Push Docker Image
              run: |
                docker push jagtapritesh16/weather-app
            
    deploy-to-ec2:    
      name: Deploy to EC2
      runs-on: ubuntu-latest
      needs: build-and-push

      steps:
        # 1. Copy private key
        - name: set up SSH key
          run: |
            echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
            chmod 600 private_key.pem

        # 2. SSH into EC2 and deploy docker container
        - name: SSH & Deploy docker container
          uses: appleboy/ssh-action@v0.1.8
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
                # Pull latest Image
                docker pull ${{ secrets.DOCKER_USERNAME }}/weather-app:latest
                #stop old container if exists
                docker stop weather-app || true
                docker rm weather-app || true
                #Run container
                docker run -d --name weather-app -p 80:80 ${{ secrets.DOCKER_USERNAME }}/weather-app:latest